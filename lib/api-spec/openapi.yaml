openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: categories
    description: Product category operations
  - name: products
    description: Product operations
  - name: gallery
    description: Gallery media operations
  - name: testimonials
    description: Customer testimonial operations
  - name: admin
    description: Admin authentication and management
  - name: storage
    description: File upload and serving
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List all categories
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"

  /admin/categories:
    post:
      operationId: createCategory
      tags: [admin]
      summary: Create a category (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/categories/{id}:
    patch:
      operationId: updateCategory
      tags: [admin]
      summary: Update a category (admin only)
      parameters:
        - $ref: "#/components/parameters/CategoryId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteCategory
      tags: [admin]
      summary: Delete a category (admin only)
      parameters:
        - $ref: "#/components/parameters/CategoryId"
      responses:
        "204":
          description: Deleted
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List products
      parameters:
        - name: categorySlug
          in: query
          required: false
          schema:
            type: string
        - name: featured
          in: query
          required: false
          schema:
            type: boolean
        - name: newArrival
          in: query
          required: false
          schema:
            type: boolean
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"

  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get a product by id
      parameters:
        - $ref: "#/components/parameters/ProductId"
      responses:
        "200":
          description: Product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/products:
    post:
      operationId: createProduct
      tags: [admin]
      summary: Create a product (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/products/{id}:
    patch:
      operationId: updateProduct
      tags: [admin]
      summary: Update a product (admin only)
      parameters:
        - $ref: "#/components/parameters/ProductId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteProduct
      tags: [admin]
      summary: Delete a product (admin only)
      parameters:
        - $ref: "#/components/parameters/ProductId"
      responses:
        "204":
          description: Deleted
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /gallery:
    get:
      operationId: listGalleryItems
      tags: [gallery]
      summary: List gallery items
      parameters:
        - name: categorySlug
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of gallery items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GalleryItem"

  /admin/gallery:
    post:
      operationId: createGalleryItem
      tags: [admin]
      summary: Create a gallery item (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GalleryItemInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GalleryItem"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/gallery/{id}:
    delete:
      operationId: deleteGalleryItem
      tags: [admin]
      summary: Delete a gallery item (admin only)
      parameters:
        - $ref: "#/components/parameters/GalleryItemId"
      responses:
        "204":
          description: Deleted
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /testimonials:
    get:
      operationId: listTestimonials
      tags: [testimonials]
      summary: List testimonials
      responses:
        "200":
          description: List of testimonials
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Testimonial"

  /admin/testimonials:
    post:
      operationId: createTestimonial
      tags: [admin]
      summary: Create a testimonial (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TestimonialInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Testimonial"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/testimonials/{id}:
    delete:
      operationId: deleteTestimonial
      tags: [admin]
      summary: Delete a testimonial (admin only)
      parameters:
        - $ref: "#/components/parameters/TestimonialId"
      responses:
        "204":
          description: Deleted
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/login:
    post:
      operationId: adminLogin
      tags: [admin]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminLoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminSession"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/logout:
    post:
      operationId: adminLogout
      tags: [admin]
      summary: Admin logout
      responses:
        "204":
          description: Logged out

  /admin/me:
    get:
      operationId: getAdminSession
      tags: [admin]
      summary: Get current admin session
      responses:
        "200":
          description: Current session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminSession"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /storage/uploads/request-url:
    post:
      operationId: requestUploadUrl
      tags: [storage]
      summary: Request a presigned upload URL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadUrlRequestInput"
      responses:
        "200":
          description: Presigned upload URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadUrlInfo"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /storage/objects/{objectPath}:
    get:
      operationId: getStorageObject
      tags: [storage]
      summary: Serve an uploaded object
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The object file
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  parameters:
    CategoryId:
      name: id
      in: path
      required: true
      schema:
        type: integer
    ProductId:
      name: id
      in: path
      required: true
      schema:
        type: integer
    GalleryItemId:
      name: id
      in: path
      required: true
      schema:
        type: integer
    TestimonialId:
      name: id
      in: path
      required: true
      schema:
        type: integer

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    Category:
      type: object
      required: [id, name, slug]
      properties:
        id: { type: integer }
        name: { type: string }
        slug: { type: string }

    CategoryInput:
      type: object
      required: [name, slug]
      properties:
        name: { type: string, minLength: 1 }
        slug: { type: string, minLength: 1 }

    CategoryUpdate:
      type: object
      properties:
        name: { type: string, minLength: 1 }
        slug: { type: string, minLength: 1 }

    Product:
      type: object
      required: [id, name, description, images, videoUrl, categoryId, price, inStock, featured, newArrival, createdAt]
      properties:
        id: { type: integer }
        name: { type: string }
        description: { type: string }
        images:
          type: array
          items: { type: string }
        videoUrl: { type: ["string", "null"] }
        categoryId: { type: ["integer", "null"] }
        price: { type: ["number", "null"] }
        inStock: { type: boolean }
        featured: { type: boolean }
        newArrival: { type: boolean }
        createdAt: { type: string, format: date-time }

    ProductInput:
      type: object
      required: [name, description]
      properties:
        name: { type: string, minLength: 1 }
        description: { type: string, minLength: 1 }
        images:
          type: array
          items: { type: string }
        videoUrl: { type: ["string", "null"] }
        categoryId: { type: ["integer", "null"] }
        price: { type: ["number", "null"] }
        inStock: { type: boolean }
        featured: { type: boolean }
        newArrival: { type: boolean }

    ProductUpdate:
      type: object
      properties:
        name: { type: string, minLength: 1 }
        description: { type: string, minLength: 1 }
        images:
          type: array
          items: { type: string }
        videoUrl: { type: ["string", "null"] }
        categoryId: { type: ["integer", "null"] }
        price: { type: ["number", "null"] }
        inStock: { type: boolean }
        featured: { type: boolean }
        newArrival: { type: boolean }

    GalleryItem:
      type: object
      required: [id, mediaUrl, mediaType, caption, categoryId, createdAt]
      properties:
        id: { type: integer }
        mediaUrl: { type: string }
        mediaType: { type: string, enum: [image, video] }
        caption: { type: ["string", "null"] }
        categoryId: { type: ["integer", "null"] }
        createdAt: { type: string, format: date-time }

    GalleryItemInput:
      type: object
      required: [mediaUrl, mediaType]
      properties:
        mediaUrl: { type: string, minLength: 1 }
        mediaType: { type: string, enum: [image, video] }
        caption: { type: ["string", "null"] }
        categoryId: { type: ["integer", "null"] }

    Testimonial:
      type: object
      required: [id, name, quote, rating]
      properties:
        id: { type: integer }
        name: { type: string }
        quote: { type: string }
        rating: { type: integer }

    TestimonialInput:
      type: object
      required: [name, quote, rating]
      properties:
        name: { type: string, minLength: 1 }
        quote: { type: string, minLength: 1 }
        rating: { type: integer, minimum: 1, maximum: 5 }

    AdminLoginInput:
      type: object
      required: [email, password]
      properties:
        email: { type: string }
        password: { type: string }

    AdminSession:
      type: object
      required: [email, authenticated]
      properties:
        email: { type: string }
        authenticated: { type: boolean }

    UploadUrlRequestInput:
      type: object
      required: [name, size, contentType]
      properties:
        name: { type: string }
        size: { type: integer }
        contentType: { type: string }

    UploadUrlInfo:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL: { type: string }
        objectPath: { type: string }
